<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Home</title>

    <!-- tailwind + dasyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- favicon -->
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />
    <!-- outfit font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <!-- Header section -->

    <header
      class="border-b-2 border-gray-300 sticky top-0 bg-white/30 backdrop-blur-sm rounded-2xl z-10"
    >
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="left flex gap-1">
          <div class="logo w-[60px]">
            <img src="assets/logo.png" alt="" />
          </div>
          <div class="balance-info">
            <h2 class="text-2xl font-bold">
              $ <span id="balance">40000</span>
            </h2>
            <p class="text-neutral/50">available balance</p>
          </div>
        </div>
        <div class="right">
          <a href="index.html" class="btn btn-soft"
            >logout <i class="fa-solid fa-arrow-right-from-bracket"></i
          ></a>
        </div>
      </section>
    </header>

    <!-- Utility Buttons -->

    <section class="w-11/12 mx-auto font-bold py-10 space-y-5">
      <h2 class="text-2xl">
        Welcome to Pay<span class="text-primary">oo</span>
      </h2>
      <p class="text-neutral/50">
        Enjoy easy and convenient financial services with us. Cashout charge is
        low and transactions are fast.
      </p>

      <div class="button grid grid-cols-3 gap-3">
        <button onclick="show('add-money')"
          class="btn flex flex-col h-full items-center py-4 rounded-3xl btn-soft"
        >
          <img src="assets/opt-1.png" alt="" />
          <p>Add Money</p>
        </button>

        <button onclick="show('cashout')"
          class="btn flex flex-col h-full items-center py-4 rounded-3xl btn-soft"
        >
          <img src="assets/opt-2.png" alt="" />
          <p>Cashout</p>
        </button>

        <button onclick="show('send-money')"
          class="btn flex flex-col h-full items-center py-4 rounded-3xl btn-soft"
        >
          <img src="assets/opt-3.png" alt="" />
          <p>Send Money</p>
        </button>

        <button onclick="show('get-bonus')"
          class="btn flex flex-col h-full items-center py-4 rounded-3xl btn-soft"
        >
          <img src="assets/opt-4.png" alt="" />
          <p>Get Bonus</p>
        </button>

        <button onclick="show('pay-bill')"
          class="btn flex flex-col h-full items-center py-4 rounded-3xl btn-soft"
        >
          <img src="assets/opt-5.png" alt="" />
          <p>Pay Bills</p>
        </button>

        <button onclick="show('transaction-history')"
          class="btn flex flex-col h-full items-center py-4 rounded-3xl btn-soft"
        >
          <img src="assets/opt-6.png" alt="" />
          <p>Transactions</p>
        </button>
      </div>
    </section>

    <section id="add-money" class="w-11/12 mx-auto py-5 hidden">
      <h2 class="font-bold text-2xl mb-5">Add Money</h2>
      <div class="card bg-base-100 w-full shadow-xl rounded-2xl mx-auto">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-neutral/50 font-bold">Select Bank </label>
            <select
              id="add-bank"
              class="select w-full rounded-full bg-base-200"
            >
              <option disabled selected class="text-neutral/50 font-bold">
                Select bank
              </option>
              <option>DBBL</option>
              <option>CITY</option>
              <option>SUN</option>
            </select>

            <br />

            <label class="label text-neutral/50 font-bold"
              >Bank Account Number</label
            >
            <input
              id="add-number"
              maxlength="11"
              minlength="11"
              type="text"
              class="input rounded-full bg-base-200 w-full"
              placeholder="Enter Agent 11-Digit Number"
            />

            <br />

            <label class="label text-neutral/50 font-bold">Amount</label>
            <input
              id="add-amount"
              maxlength="11"
              minlength="11"
              type="text"
              class="input rounded-full bg-base-200 w-full"
              placeholder="Enter Amount to Add"
            />

            <br />

            <label class="label text-neutral/50 font-bold">4-Digit PIN</label>
            <input
              id="add-pin"
              type="password"
              maxlength="4"
              class="input rounded-full bg-base-200 w-full"
              placeholder="4-Digit PIN"
            />

            <button id="add-money-btn" class="btn btn-primary mt-4 rounded-full">
              Add Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <section id="cashout" class="w-11/12 mx-auto py-5 hidden">
      <h2 class="font-bold text-2xl mb-5">Cashout</h2>

      <div class="card bg-base-100 w-full shadow-xl rounded-2xl mx-auto">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-neutral/50 font-bold">Agent Number</label>
            <input
              id="cashout-number"
              maxlength="11"
              minlength="11"
              type="text"
              class="input rounded-full bg-base-200 w-full"
              placeholder="Enter Agent 11-Digit Number"
            />

            <br />

            <label class="label text-neutral/50 font-bold">Amount</label>
            <input
              id="cashout-amount"
              maxlength="11"
              minlength="11"
              type="text"
              class="input rounded-full bg-base-200 w-full"
              placeholder="Enter Amount to Withdraw"
            />

            <br />

            <label class="label text-neutral/50 font-bold">4-Digit PIN</label>
            <input
              id="cashout-pin"
              type="password"
              maxlength="4"
              class="input rounded-full bg-base-200 w-full"
              placeholder="4-Digit PIN"
            />

            <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full">
              Withdraw Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>

     <!-- Send money -->
    <section id="send-money" class=" bg-base-200 w-11/12 mx-auto py-5 hidden">
        <div class="w-11/12 py-4 pl-6">
            <h2 class=" text-neutral font-bold text-2xl ">Send Money</h2>
        </div>

        <div class="card w-11/12 bg-base-100  rounded-2xl mx-auto  ">
            <div class="card-body ">
                <fieldset class="fieldset">

                    <label class="label text-neutral/50 font-semibold">User Account Number</label>
                    <input id="user-number" maxlength="11" type="number" inputmode="numeric"
                        class="input rounded-full bg-base-200 w-full mb-4" required placeholder="Enter 11 digit number"
                         />

                    <label class="label text-neutral/50 font-semibold">Amount</label>
                    <input id="send-amount" type="number" required
                        class="input input-bordered rounded-full bg-base-200 focus:ring-0 focus:border-primary w-full mb-4"
                        placeholder="Enter amount to transfer" />

                    <label class="label text-neutral/50 font-semibold">Pin Number</label>
                    <input id="send-pin" type="password" maxlength="4" minlength="4" required
                        class="input input-bordered rounded-full bg-base-200 focus:ring-0 focus:border-primary w-full mb-4"
                        placeholder="Enter 4 digit pin number" />

                    <button id="send-btn"
                        class="btn btn-neutral mt-4 rounded-full bg-primary shadow-none text-white text-[1.25rem] font-semibold">Send
                        Now</button>
                </fieldset>
            </div>
        </div>

    </section>


        <!-- Bonus section -->
          <section id="get-bonus" class=" bg-base-200 w-11/12 mx-auto py-5 hidden">
        <div class="w-11/12 py-4 pl-6">
            <h2 class=" text-neutral font-bold text-2xl ">Get Bonus</h2>
        </div>

        <div class="card w-11/12 bg-base-100  rounded-2xl mx-auto ">
            <div class="card-body ">
                <fieldset class="fieldset">

                    <label class="label text-neutral/50 font-semibold">Enter Bonus Coupon</label>
                    <input id="bonus-number" type="text" class="input rounded-full bg-base-200 w-full" required
                        placeholder="Enter your coupon" value="Bonus100" />

                    <button id="bonus-btn"
                        class="btn btn-neutral mt-4 rounded-full bg-primary shadow-none text-white text-[1.25rem] font-semibold">Get
                        Bonus</button>
                </fieldset>
            </div>
        </div>
        </section>



      <!-- pay Bill section-->
    <section id="pay-bill" class=" bg-base-200 w-11/12 mx-auto py-5 hidden ">
        <div class="w-11/12 py-4 pl-6">
            <h2 class=" text-neutral font-bold text-2xl ">Select To Pay</h2>
        </div>

        <div class="card w-11/12 bg-base-100  rounded-2xl mx-auto shadow-2xl">
            <div class="card-body ">
                <fieldset class="fieldset">

                    <label class="label text-neutral/50 font-semibold">Select A Bank</label>
                    <select id="pay-bill-bank" class="select input rounded-full bg-base-200 w-full mb-4 ">
                        <option disabled selected>Select bank</option>
                        <option value="SBI">SBI</option>
                        <option value="PNB">PNB</option>
                        <option value="HDFC">HDFC</option>
                    </select>

                    <label class="label text-neutral/50 font-semibold">Biller Account Number</label>
                    <input id="pay-bill-number" type="number" inputmode="numeric"
                        class="input rounded-full bg-base-200 w-full mb-4" required
                        placeholder="Enter 11 digit account number"/>

                    <label class="label text-neutral/50 font-semibold">Amount to Pay</label>
                    <input id="pay-bill-amount" type="number" required
                        class="input input-bordered rounded-full bg-base-200 focus:ring-0 focus:border-primary w-full mb-4"
                        placeholder="Add Amount to pay" />

                    <label class="label text-neutral/50 font-semibold">Pin Number</label>
                    <input id="pay-bill-pin" type="password" maxlength="4" minlength="4" required
                        class="input input-bordered rounded-full bg-base-200 focus:ring-0 focus:border-primary w-full mb-4"
                        placeholder="Enter 4 digit pin number" />

                    <button id="pay-bill-btn"
                        class="btn btn-neutral mt-4 rounded-full bg-primary shadow-none text-white text-[1.25rem] font-semibold ">Pay
                        Now</button>
                </fieldset>
            </div>
        </div>

    </section>

    






    <section id="transaction-history" class="w-11/12 mx-auto py-5 space-y-5 hidden">
      <h2 class="text-xl font-bold mb-5">Transaction History</h2>

      <div id="history-container" class=" ">

        <div class="transaction-card p-5 bg-base-100">



        </div>

      </div>
    </section>


    <script src="script/addmoney.js"></script>

    <script src="script/cashout.js"></script>

    <script src="script/send.js"></script>

    <script src="script/bonus.js"></script>

    <script src="script/pay.js"></script>

    <script src="script/common.js"></script>

    

  </body>
</html>
